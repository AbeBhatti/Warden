environments:
  production:
    description: "Real customer-facing systems. Minimum blast radius."
    allowed_compliance_tags:
      - HIPAA
      - PCI
      - SOX
      - GDPR
    capabilities:
      github:
        max_ttl_seconds: 900
        allowed_permissions:
          - read
          - write
        max_repos_per_run: 1
        compliance_rules:
          min_justification_length: 20
      groq:
        max_ttl_seconds: 300
        allowed_models:
          - llama-3.3-70b-versatile
        max_tokens_per_call: 1024
        compliance_rules:
          min_justification_length: 20
  staging:
    description: "Pre-production systems. Wider tolerances for testing."
    allowed_compliance_tags: []
    capabilities:
      github:
        max_ttl_seconds: 3600
        allowed_permissions:
          - read
          - write
        max_repos_per_run: 5
        compliance_rules:
          min_justification_length: 0
      groq:
        max_ttl_seconds: 1800
        allowed_models:
          - llama-3.3-70b-versatile
          - llama-3.1-8b-instant
        max_tokens_per_call: 2048
        compliance_rules:
          min_justification_length: 0
  development:
    description: "Local dev and testing. Loose limits for experimentation."
    allowed_compliance_tags:
      - GDPR
    capabilities:
      github:
        max_ttl_seconds: 3600
        allowed_permissions:
          - read
          - write
        max_repos_per_run: 20
        compliance_rules:
          min_justification_length: 0
      groq:
        max_ttl_seconds: 3600
        allowed_models:
          - llama-3.3-70b-versatile
          - llama-3.1-8b-instant
          - mixtral-8x7b-32768
        max_tokens_per_call: 4096
        compliance_rules:
          min_justification_length: 0

compliance_frameworks:
  HIPAA:
    description: "Health Insurance Portability and Accountability Act"
    required_justification_fields:
      - data_subject
      - medical_purpose
    audit_retention_days: 2555
    require_approval_on_request: true
  PCI:
    description: "Payment Card Industry Data Security Standard"
    required_justification_fields:
      - cardholder_scope
      - transaction_context
    audit_retention_days: 365
    require_approval_on_request: true
  SOX:
    description: "Sarbanes-Oxley financial reporting controls"
    required_justification_fields:
      - financial_scope
      - business_purpose
    audit_retention_days: 2555
    require_approval_on_request: false
  GDPR:
    description: "General Data Protection Regulation (EU)"
    required_justification_fields:
      - data_subject
      - lawful_basis
    audit_retention_days: 1095
    require_approval_on_request: false
